name: CI/CD Message Board REST-APIs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rest-apis

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Bei GHCR anmelden
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Metadaten erzeugen
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker-Image bauen und pushen
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Per SSH auf dem Server deployen
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            docker compose --env-file /opt/apps/.env \
              -f /opt/apps/message_board_rest_api/compose.yaml \
              -f /opt/apps/message_board_rest_api/compose.server.yaml \
              pull message_board_rest_api

            docker compose --env-file /opt/apps/.env \
              -f /opt/apps/message_board_rest_api/compose.yaml \
              -f /opt/apps/message_board_rest_api/compose.server.yaml \
              up -d --force-recreate message_board_rest_api