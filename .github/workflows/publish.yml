name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Substitute domain for GitHub Pages
        run: |
          find quarto -name "*.qmd" -o -name "*.json" | xargs sed -i \
            -e "s|DOMAIN_PLACEHOLDER|https://rest.fschmalzel.de|g" \
            -e "s|DOMAIN_HOST_PLACEHOLDER|rest.fschmalzel.de|g"

      - name: Render site
        run: quarto render quarto/

      - name: Add CNAME
        run: echo "rest.fschmalzel.de" > quarto/_site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: quarto/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4